<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            text-align: center;
            overflow: hidden;
            margin: 0;
        }

        /* Background Video Styling */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .container {
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 1;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 5s ease infinite;
            overflow: hidden;
         
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Styling for the video inside the container */
        .card-video {
            width: 100%;
            /* Forces the video to fill the width of the container */
            height: 140px;
            /* You can change this to make the video box taller or shorter */
            aspect-ratio: 9 / 16;
            /* This keeps it in a nice portrait shape (like a phone screen) */
            object-fit: cover;
            /* This ensures the video fills the box without distortion */
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: block;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 1px 5px 10px red;
        }

        h1 {
            color: #d81b60;
            margin-bottom: 20px;
            font-size: clamp(1.5rem, 5vw, 3rem);
        }

        .button-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            height: 60px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            font-weight: bold;
        }

        #yesBtn {
            background-color: #12b398;
            color: white;
            transition: transform 0.2s;
            border: 1px solid #2e7d32;
            padding: 10px 40px;
        }

        #noBtn {
            background-color: #f44336;
            color: white;
            position: absolute;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <video autoplay muted loop playsinline class="bg-video">
        <source src="birth.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="overlay"></div>

    <div class="container">
        <video class="card-video" autoplay muted loop playsinline>
            <source src="pp.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <h1 style="font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; color:#d68f15;">Happy Birthday! 🍥</h1>
        <p>Will you accept my wishes?</p>

        <div class="button-wrapper">
            <button id="yesBtn" onclick="acceptWish()">Thankyou</button>
            <button id="noBtn">Nhi Bolunge</button>
        </div>
    </div>

   <script>
    const noBtn = document.getElementById('noBtn');

    function moveButton() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        const btnWidth = noBtn.offsetWidth;
        const btnHeight = noBtn.offsetHeight;

        const randomX = Math.random() * (windowWidth - btnWidth - 40) + 20;
        const randomY = Math.random() * (windowHeight - btnHeight - 40) + 20;

        noBtn.style.left = `${randomX}px`;
        noBtn.style.top = `${randomY}px`;
    }

    noBtn.addEventListener('mouseover', moveButton);
    noBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        moveButton();
    });

    function acceptWish() {
        alert(`Wishing you the happiest birthday AryaSree (Kooliyil) ever! 🎉
No matter how far apart we are, distance is just a number when it comes to someone as special as you.

I hope your day is filled with laughter, joy, and everything that makes you smile. Even though I’m not there 🥲, I’m celebrating you from here and thinking of you.

May you keep achieving success and moving forward in life. ✨

Enjoy every moment and make your day truly special ! 💫
Once Again wish Uh Happiest Birthday !💞...
`);
    }
</script>
</body>

</html>
